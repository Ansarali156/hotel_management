name: Keep Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 minutes
  workflow_dispatch:        # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          # Override via repo secret BACKEND_HEALTH_URL if the deployed hostname differs.
          BACKEND_HEALTH_URL: ${{ secrets.BACKEND_HEALTH_URL || 'https://safestay-backend.onrender.com/health' }}
        run: |
          curl -s --max-time 60 "$BACKEND_HEALTH_URL" || true
