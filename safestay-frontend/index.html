<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>CheckInNow - Hotel & Police Management</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Professional hotel guest management with real-time police verification and criminal monitoring" />
    <meta name="theme-color" content="#1B4332" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1B4332" media="(prefers-color-scheme: dark)" />
    
    <!-- Mobile App Capabilities -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CheckInNow" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Icons & Favicons -->
    <link rel="icon" href="/checkinnow-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/checkinnow-icon.svg" />
    <link rel="mask-icon" href="/checkinnow-icon.svg" color="#1B4332" />
    
    <!-- Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&family=Noto+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
