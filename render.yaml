# Render.com blueprint for the SafeStay / CheckInNow PWA.
#
# This provisions:
#   - One Postgres database (free tier)
#   - The Node/Express backend as a Web Service
#   - Two static sites — one per portal (hotel + police) — served from the
#     same safestay-frontend build with different VITE_PORTAL values so the
#     root route redirects to the correct login.
#
# After the first deploy:
#   1. On the backend service, set the secret env vars (listed as sync:false
#      below). Generate fresh ones — do NOT reuse the development values.
#      See DEPLOY.md for the exact commands.
#   2. Update HOTEL_FRONTEND_ORIGIN / POLICE_FRONTEND_ORIGIN to the
#      `onRender.com` URLs Render assigns to the two static sites.
#   3. Run the seed scripts once via `render exec` or a one-off shell:
#        npm run seed && npm run seed:officer
#   4. Hit https://<backend>.onrender.com/health — expect `{"status":"ok"}`.
#
# BullMQ requires a TCP Redis connection. Render Key Value (Redis) or
# Upstash's rediss:// URL both work. Upstash REST alone is NOT enough for
# the workers.

databases:
  - name: safestay-postgres
    databaseName: safestay_db
    user: safestay
    plan: free
    region: oregon

services:
  # ── Backend (Express + BullMQ + Socket.IO) ──────────────────────────────
  - type: web
    name: safestay-backend
    env: node
    region: oregon
    plan: free
    rootDir: safestay-backend
    buildCommand: npm ci && npx prisma generate --schema=src/database/prisma/schema.prisma && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: safestay-postgres
          property: connectionString
      # REDIS_URL must be a TCP redis:// or rediss:// URL (Upstash or Render KV).
      - key: REDIS_URL
        sync: false
      # Secrets — set these manually in the Render dashboard (sync:false keeps
      # them out of the blueprint/git).
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: AADHAAR_ENCRYPTION_KEY
        sync: false
      - key: FILE_SERVE_SECRET
        sync: false
      - key: SWAGGER_PASSWORD
        sync: false
      # Frontend origins — update these to the static-site URLs after first deploy.
      - key: HOTEL_FRONTEND_ORIGIN
        value: https://safestay-hotel.onrender.com
      - key: POLICE_FRONTEND_ORIGIN
        value: https://safestay-police.onrender.com
      - key: ALLOWED_EXTRA_ORIGINS
        value: ""
      # Optional integrations — leave blank for the demo.
      - key: RESEND_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Hotel portal static site ────────────────────────────────────────────
  - type: web
    name: safestay-hotel
    env: static
    region: oregon
    plan: free
    rootDir: safestay-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://safestay-backend.onrender.com
      - key: VITE_PORTAL
        value: hotel
    routes:
      # SPA fallback so deep links don't 404.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer

  # ── Police portal static site ───────────────────────────────────────────
  - type: web
    name: safestay-police
    env: static
    region: oregon
    plan: free
    rootDir: safestay-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE_URL
        value: https://safestay-backend.onrender.com
      - key: VITE_PORTAL
        value: police
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: no-referrer
